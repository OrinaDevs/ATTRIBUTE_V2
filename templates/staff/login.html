<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Staff Login – Attribute Survey</title>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"/>
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css"/>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <style>
    body { font-family:'Inter',sans-serif; background:linear-gradient(135deg,#1a3a5c,#0d2137); min-height:100vh; display:flex; align-items:center; }
    .auth-card { background:#fff; border-radius:20px; padding:40px; max-width:420px; width:100%; box-shadow:0 24px 64px rgba(0,0,0,0.3); }
    .staff-badge { background:#fff3cd; border:1px solid #ffc107; border-radius:8px; padding:10px 16px; font-size:13px; color:#664d03; margin-bottom:24px; }
    .form-control { border-radius:10px; padding:10px 14px; border-color:#d1d5db; }
    .form-control:focus { border-color:#1a3a5c; box-shadow:0 0 0 3px rgba(26,58,92,0.1); }
    .btn-primary { background:#1a3a5c;border-color:#1a3a5c;border-radius:10px;padding:12px;font-weight:600; }
    .btn-primary:hover { background:#1e4a75; }
  </style>
</head>
<body>
<div class="container">
  <div class="row justify-content-center">
    <div class="col-md-6 col-lg-5">
      {% if messages %}{% for msg in messages %}
      <div class="alert alert-{{ msg.tags|default:'info' }} mb-3 rounded-3">{{ msg }}</div>
      {% endfor %}{% endif %}
      <div class="auth-card">
        <div class="text-center mb-4">
          <div style="width:60px;height:60px;background:#1a3a5c;border-radius:16px;display:flex;align-items:center;justify-content:center;margin:0 auto 16px;">
            <i class="bi bi-shield-lock-fill text-white" style="font-size:26px;"></i>
          </div>
          <h4 class="fw-700 mb-1">Staff Portal</h4>
          <p class="text-muted small">Step 1 of 2 — Enter your credentials</p>
        </div>
        <div class="staff-badge">
          <i class="bi bi-info-circle me-2"></i>
          After verifying your password, an OTP will be sent to your registered email.
        </div>
        <form method="post">
          {% csrf_token %}
          <div class="mb-3">
            <label class="form-label fw-500" style="font-size:13px;">Staff Email</label>
            <input type="email" name="username" class="form-control" placeholder="staff@attributesurvey.co.ke" required autofocus/>
          </div>
          <div class="mb-4">
            <label class="form-label fw-500" style="font-size:13px;">Password</label>
            <input type="password" name="password" class="form-control" placeholder="••••••••" required/>
          </div>
          <button type="submit" class="btn btn-primary w-100">Continue <i class="bi bi-arrow-right ms-2"></i></button>
        </form>
        <p class="text-center text-muted small mt-4">
          Not staff? <a href="{% url 'login' %}" class="fw-600 text-decoration-none" style="color:#1a3a5c;">Client Login →</a>
        </p>
      </div>
    </div>
  </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
